<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Tahoma,Arial,sans-serif}html,body{width:100%;height:100%;background:#0b141a;color:#e9edef;overflow:hidden}body{min-height:100dvh}.app{width:100%;height:100dvh;display:flex;background:#0b141a}.sidebar{width:370px;background:#111b21;border-left:1px solid #26343c;display:flex;flex-direction:column}.meBox{min-height:72px;background:#202c33;display:flex;align-items:center;gap:12px;padding:10px 16px}.avatar{width:48px;height:48px;border-radius:50%;object-fit:cover;background:#00a884;flex-shrink:0}.meName{font-size:17px;font-weight:bold}.userStatus{font-size:12px;color:#8696a0;margin-top:4px}.online{color:#00a884}.topBtns{display:flex;gap:7px;margin-right:auto}.smallBtn,.themeBtn{border:none;border-radius:50%;width:40px;height:40px;background:#2a3942;color:white;font-size:17px;cursor:pointer}.searchBox{padding:10px;background:#111b21;display:flex;gap:8px}.searchBox input{width:100%;padding:12px 14px;border:none;outline:none;border-radius:12px;background:#202c33;color:white;font-size:14px}.stories{display:flex;gap:10px;overflow-x:auto;padding:10px;border-bottom:1px solid #1f2c33}.story{min-width:62px;text-align:center;font-size:11px;color:#cfd8dc;cursor:pointer}.story img,.story .storyCircle{width:52px;height:52px;border-radius:50%;object-fit:cover;border:2px solid #00a884;background:#2a3942;display:flex;align-items:center;justify-content:center}.tabs{display:flex;background:#111b21;border-bottom:1px solid #1f2c33}.tab{flex:1;padding:12px;border:none;background:transparent;color:#8696a0;cursor:pointer}.tab.active{color:#00a884;border-bottom:2px solid #00a884}.users{flex:1;overflow-y:auto}.user{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;border-bottom:1px solid #1f2c33;transition:.18s}.user:hover,.user.active{background:#202c33}.userData{flex:1;min-width:0}.userName{font-weight:bold;font-size:15px}.creator{padding:12px;text-align:center;font-size:12px;color:#8696a0;border-top:1px solid #1f2c33;background:#111b21}.chat{flex:1;display:flex;flex-direction:column;background:#0b141a;min-width:0}.chatHeader{height:72px;background:#202c33;display:flex;align-items:center;gap:12px;padding:10px 18px;flex-shrink:0}.backBtn{display:none;background:none;border:none;color:white;font-size:30px;cursor:pointer}.headerInfo{flex:1;min-width:0}.headerName{font-size:17px;font-weight:bold}.headerStatus{font-size:12px;color:#8696a0;margin-top:4px}.headerActions{display:flex;gap:8px}.messages{flex:1;overflow-y:auto;padding:16px;background:#0b141a;background-image:radial-gradient(circle at 1px 1px,#18252c 1px,transparent 0);background-size:22px 22px;display:flex;flex-direction:column}.empty{height:100%;display:flex;align-items:center;justify-content:center;color:#8696a0;text-align:center}.msg{width:fit-content;max-width:78%;min-width:45px;margin:7px 0;padding:8px 11px 6px;border-radius:18px;position:relative;word-wrap:break-word;overflow-wrap:break-word;font-size:15px;line-height:1.5;display:flex;flex-direction:column;box-shadow:0 1px 1px rgba(0,0,0,.12);animation:pop .18s ease}.me{align-self:flex-start;background:#005c4b;border-bottom-left-radius:5px}.other{align-self:flex-end;background:#202c33;border-bottom-right-radius:5px}@keyframes pop{from{opacity:0;transform:translateY(10px) scale(.98)}to{opacity:1;transform:none}}.msgText{white-space:pre-wrap}.msgImg{max-width:240px;border-radius:8px;display:block}.msg audio{width:220px}.fileBox{display:flex;align-items:center;gap:10px;padding:10px;background:rgba(255,255,255,.08);border-radius:10px;color:white;text-decoration:none}.replyPreview{border-right:3px solid #00a884;background:rgba(255,255,255,.08);padding:6px 8px;border-radius:8px;margin-bottom:5px;font-size:12px;color:#cfd8dc}.msgMeta{font-size:11px;color:#cfd8dc;margin-top:3px;text-align:left;direction:ltr}.tick{margin-right:5px;color:#b6c2c9}.tick.read{color:#53bdeb}.deleted{color:#b6c2c9;font-style:italic}.editTag{font-size:11px;color:#b6c2c9}.msgActions{display:none;position:absolute;top:-42px;left:0;gap:5px;background:#233138;padding:5px;border-radius:12px;box-shadow:0 3px 10px rgba(0,0,0,.25);z-index:10}.msg.showActions .msgActions{display:flex}.msgActions button{border:none;border-radius:12px;padding:5px 9px;font-size:11px;cursor:pointer;background:#075e54;color:white}.typing{height:22px;padding:0 20px;color:#00a884;font-size:13px;background:#0b141a}.replyBar{display:none;background:#172229;border-right:4px solid #00a884;padding:9px 14px;color:#cfd8dc;font-size:13px}.replyBar.show{display:flex;align-items:center;justify-content:space-between}.inputArea{min-height:70px;background:#202c33;display:flex;align-items:center;gap:8px;padding:10px;position:relative}.inputArea input[type=text]{flex:1;border:none;outline:none;border-radius:24px;padding:13px 16px;background:#2a3942;color:white;font-size:15px;min-width:0}.btn{border:none;border-radius:50%;width:45px;height:45px;background:#00a884;color:white;font-size:18px;cursor:pointer;flex-shrink:0}.btn.gray{background:#2a3942}.emojiPanel{display:none;position:absolute;bottom:74px;right:10px;background:#202c33;border:1px solid #34444d;border-radius:16px;padding:10px;width:275px;box-shadow:0 10px 30px #0008;z-index:30}.emojiPanel.show{display:grid;grid-template-columns:repeat(8,1fr);gap:5px}.emojiPanel button{font-size:22px;background:#2a3942;border:none;border-radius:10px;padding:5px;cursor:pointer}.login{position:fixed;inset:0;background:linear-gradient(135deg,#061014,#102028);display:flex;align-items:center;justify-content:center;z-index:99}.loginBox{width:330px;background:#202c33;border-radius:18px;padding:26px;box-shadow:0 20px 60px #0008}.logo{font-size:30px;font-weight:bold;margin-bottom:8px}.sub{color:#8696a0;margin-bottom:20px}.loginBox input[type=text]{width:100%;padding:14px;border:none;outline:none;border-radius:12px;background:#2a3942;color:white;margin-bottom:12px}.fileLabel{display:block;padding:13px;border:1px solid #3b4a54;border-radius:12px;text-align:center;margin-bottom:12px;color:#cfd8dc;cursor:pointer}.loginBtn{width:100%;border:none;border-radius:12px;padding:14px;background:#00a884;color:white;font-size:16px;font-weight:bold;cursor:pointer}.overlay{display:none;position:fixed;inset:0;background:#000d;z-index:200;align-items:center;justify-content:center;flex-direction:column;gap:12px}.overlay.show{display:flex}.videoBox{width:min(90vw,760px);display:grid;grid-template-columns:1fr 1fr;gap:10px}.videoBox video{width:100%;background:#111;border-radius:16px}.callControls button{padding:12px 18px;border:none;border-radius:22px;background:#e53935;color:white;font-weight:bold}.light{background:#f0f2f5;color:#111}.light .app,.light .chat{background:#efeae2;color:#111}.light .sidebar,.light .meBox,.light .chatHeader,.light .inputArea,.light .creator,.light .searchBox{background:#fff;color:#111}.light .messages{background:#efeae2;background-image:radial-gradient(circle at 1px 1px,#d8d0c4 1px,transparent 0)}.light .searchBox input,.light .inputArea input[type=text],.light .loginBox input[type=text]{background:#f0f2f5;color:#111}.light .other{background:#fff;color:#111}.light .me{background:#d9fdd3;color:#111}.light .btn.gray,.light .smallBtn,.light .themeBtn{background:#e9edef;color:#111}@media(max-width:768px){.sidebar{width:100%;height:100dvh;position:absolute;inset:0;z-index:2}.chat{width:100%;height:100dvh;position:absolute;inset:0;z-index:1}.app.openChat .sidebar{display:none}.app.openChat .chat{z-index:3}.backBtn{display:block}.msg{max-width:85%;font-size:14px}.msgImg{max-width:210px}.inputArea{position:sticky;bottom:0;z-index:20;padding-bottom:calc(8px + env(safe-area-inset-bottom))}.btn{width:42px;height:42px}.videoBox{grid-template-columns:1fr}}
</style></head><body>
<div class="login" id="login"><div class="loginBox"><div class="logo">ChatApp Pro</div><div class="sub">مثل واتساپ، سبک و رایگان برای Render</div><input id="username" type="text" placeholder="نام خود را وارد کنید"><label class="fileLabel">انتخاب عکس پروفایل<input id="avatarInput" type="file" accept="image/*" hidden></label><button class="loginBtn" onclick="joinChat()">ادامه</button></div></div>
<div class="app" id="app"><div class="sidebar"><div class="meBox"><img class="avatar" id="myAvatar" src="https://i.imgur.com/6VBx3io.png"><div><div class="meName" id="myName">User</div><div class="userStatus online">آنلاین</div></div><div class="topBtns"><button class="smallBtn" onclick="createGroup()" title="گروپ">👥</button><button class="smallBtn" onclick="addStory()" title="استوری">➕</button></div></div><div class="stories" id="stories"><div class="story" onclick="addStory()"><div class="storyCircle">+</div><div>استوری</div></div></div><div class="tabs"><button id="tabUsers" class="tab active" onclick="setTab('users')">کاربران</button><button id="tabGroups" class="tab" onclick="setTab('groups')">گروپ‌ها</button></div><div class="searchBox"><input id="searchUser" placeholder="جستجوی کاربر/گروپ... "></div><div class="users" id="users"></div><div class="creator">ساخته شده توسط Mohammad Rahmatoghli ❤️</div></div><div class="chat"><div class="chatHeader"><button class="backBtn" onclick="goBack()">‹</button><img class="avatar" id="chatAvatar" src="https://i.imgur.com/6VBx3io.png"><div class="headerInfo"><div class="headerName" id="chatName">یک کاربر را انتخاب کنید</div><div class="headerStatus" id="chatStatus"></div></div><div class="headerActions"><button class="smallBtn" onclick="toggleMsgSearch()" title="جستجوی پیام">🔍</button><button class="smallBtn" onclick="startAudioCall()" title="تماس صوتی">📞</button><button class="smallBtn" onclick="startCall()" title="تماس تصویری">📹</button><button class="themeBtn" onclick="toggleTheme()">🌙</button></div></div><div class="searchBox" id="msgSearchBox" style="display:none"><input id="searchMsg" placeholder="جستجو در پیام‌ها..." oninput="renderChatMessages()"></div><div class="messages" id="messages"><div class="empty">از لیست کاربران یا گروپ یک مورد را انتخاب کنید</div></div><div class="typing" id="typing"></div><div class="replyBar" id="replyBar"><span id="replyText"></span><button onclick="cancelReply()" class="smallBtn">×</button></div><div class="inputArea"><button class="btn gray" onclick="toggleEmoji()">😀</button><div class="emojiPanel" id="emojiPanel"></div><button class="btn gray" onclick="document.getElementById('fileInput').click()">📎</button><input id="fileInput" type="file" hidden><input id="messageInput" type="text" placeholder="پیام خود را بنویسید..." onkeydown="enterSend(event)"><button class="btn gray" id="voiceBtn">🎤</button><button class="btn" onclick="sendMessage()">➤</button></div></div></div>
<div class="overlay" id="callOverlay"><h3 id="callTitle">تماس تصویری</h3><div class="videoBox"><video id="localVideo" autoplay muted playsinline></video><video id="remoteVideo" autoplay playsinline></video></div><div class="callControls"><button onclick="endCall()">قطع تماس</button></div></div>
<script>
let ws,myName="",myAvatar="",selectedUser="",selectedUserData=null,selectedType="user",allUsers=[],groups=[],stories=[],allMessages=[],mediaRecorder=null,audioChunks=[],replyTo=null,currentTab='users';let pc=null,localStream=null,callPeer="";const app=document.getElementById('app'),messages=document.getElementById('messages');
function uuid(){return Date.now()+"_"+Math.random().toString(16).slice(2)}
function esc(t){return String(t||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function joinChat(){myName=document.getElementById('username').value.trim();if(!myName)return alert('نام خود را وارد کنید');const f=document.getElementById('avatarInput').files[0];if(f){const r=new FileReader();r.onload=()=>{myAvatar=r.result;startSocket()};r.readAsDataURL(f)}else startSocket()}
function startSocket(){document.getElementById('login').style.display='none';document.getElementById('myName').innerText=myName;if(myAvatar)document.getElementById('myAvatar').src=myAvatar;const protocol=location.protocol==='https:'?'wss':'ws';ws=new WebSocket(`${protocol}://${location.host}/ws`);ws.onopen=()=>ws.send(JSON.stringify({type:'join',username:myName,avatar:myAvatar}));ws.onmessage=handleSocket;if('serviceWorker'in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});if('Notification'in window && Notification.permission==='default')Notification.requestPermission().catch(()=>{})}
function handleSocket(event){const data=JSON.parse(event.data);if(data.type==='users'){allUsers=data.users||[];renderList();updateHeaderStatus()}else if(data.type==='groups'){groups=data.groups||[];renderList()}else if(data.type==='stories'){stories=data.stories||[];renderStories()}else if(data.type==='history'){allMessages=data.messages||[];renderChatMessages()}else if(['message','image','voice','file'].includes(data.type)){allMessages.push(data);if(isCurrentChat(data))renderChatMessages();if(data.sender!==myName)notify(data.sender,data.text||data.file_name||'پیام جدید')}else if(data.type==='typing'){if(data.sender===selectedUser){document.getElementById('typing').innerText='در حال نوشتن...';setTimeout(()=>document.getElementById('typing').innerText='',1200)}}else if(data.type==='status'){allMessages=allMessages.map(m=>m.id===data.id?{...m,status:data.status}:m);renderChatMessages()}else if(data.type==='edit'){allMessages=allMessages.map(m=>m.id===data.id?{...m,text:data.text,edited:true}:m);renderChatMessages()}else if(data.type==='delete'){allMessages=allMessages.map(m=>m.id===data.id?{...m,deleted:true,text:'',image:'',voice:'',file_data:''}:m);renderChatMessages()}else if(data.type==='call-offer')receiveOffer(data);else if(data.type==='call-answer')receiveAnswer(data);else if(data.type==='ice-candidate')receiveIce(data);else if(data.type==='call-end')endCall(false)}
function notify(title,body){if('Notification'in window&&Notification.permission==='granted'&&document.hidden)new Notification(title,{body:body||'پیام جدید',icon:'/icon.svg'})}
function setTab(t){currentTab=t;document.getElementById('tabUsers').classList.toggle('active',t==='users');document.getElementById('tabGroups').classList.toggle('active',t==='groups');renderList()}
function renderList(){const q=document.getElementById('searchUser').value.toLowerCase(),box=document.getElementById('users');box.innerHTML='';if(currentTab==='users'){allUsers.filter(u=>u.username!==myName).filter(u=>u.username.toLowerCase().includes(q)).forEach(u=>{let d=document.createElement('div');d.className='user '+(selectedUser===u.username&&selectedType==='user'?'active':'');d.onclick=()=>selectUser(u);d.innerHTML=`<img class="avatar" src="${u.avatar||'https://i.imgur.com/6VBx3io.png'}"><div class="userData"><div class="userName">${esc(u.username)}</div><div class="userStatus ${u.online?'online':''}">${u.online?'آنلاین':'آخرین بازدید '+(u.last_seen||'')}</div></div>`;box.appendChild(d)})}else{groups.filter(g=>g.name.toLowerCase().includes(q)).forEach(g=>{let d=document.createElement('div');d.className='user '+(selectedUser===g.id&&selectedType==='group'?'active':'');d.onclick=()=>selectGroup(g);d.innerHTML=`<img class="avatar" src="${g.avatar||'https://i.imgur.com/6VBx3io.png'}"><div class="userData"><div class="userName">👥 ${esc(g.name)}</div><div class="userStatus">گروپ چت</div></div>`;box.appendChild(d)})}}
function selectUser(u){selectedType='user';selectedUser=u.username;selectedUserData=u;openHeader(u.username,u.avatar,u.online?'آنلاین':'آخرین بازدید '+(u.last_seen||''));renderList();renderChatMessages()}
function selectGroup(g){selectedType='group';selectedUser=g.id;selectedUserData=g;openHeader('👥 '+g.name,g.avatar,'گروپ چت');renderList();renderChatMessages()}
function openHeader(name,avatar,status){app.classList.add('openChat');document.getElementById('chatName').innerText=name;document.getElementById('chatAvatar').src=avatar||'https://i.imgur.com/6VBx3io.png';document.getElementById('chatStatus').innerText=status||''}
function updateHeaderStatus(){if(selectedType!=='user'||!selectedUser)return;let u=allUsers.find(x=>x.username===selectedUser);if(u){selectedUserData=u;document.getElementById('chatStatus').innerText=u.online?'آنلاین':'آخرین بازدید '+(u.last_seen||'')}}
function goBack(){app.classList.remove('openChat')}function receiverKey(){return selectedType==='group'?'group:'+selectedUser:selectedUser}function isCurrentChat(m){return selectedType==='group'?m.receiver===('group:'+selectedUser):((m.sender===myName&&m.receiver===selectedUser)||(m.sender===selectedUser&&m.receiver===myName))}
function renderChatMessages(){if(!selectedUser){messages.innerHTML='<div class="empty">از لیست کاربران یا گروپ یک مورد را انتخاب کنید</div>';return}let q=(document.getElementById('searchMsg')?.value||'').toLowerCase();let chatMsgs=allMessages.filter(isCurrentChat).filter(m=>!q||(m.text||'').toLowerCase().includes(q)||(m.file_name||'').toLowerCase().includes(q));messages.innerHTML='';if(!chatMsgs.length){messages.innerHTML='<div class="empty">هنوز پیامی نیست</div>';return}chatMsgs.forEach(m=>{let div=document.createElement('div');div.className='msg '+(m.sender===myName?'me':'other');div.dataset.id=m.id;let reply=m.reply_id?`<div class="replyPreview"><b>${esc(m.reply_sender)}</b><br>${esc(m.reply_text)}</div>`:'';let content='';if(m.deleted)content='<div class="deleted">🚫 این پیام حذف شده است</div>';else if(m.type==='image')content=`<img class="msgImg" src="${m.image}">`;else if(m.type==='voice')content=`<audio controls src="${m.voice}"></audio>`;else if(m.type==='file')content=`<a class="fileBox" download="${esc(m.file_name)}" href="${m.file_data}">📄 <span>${esc(m.file_name)}</span></a>`;else content=`<div class="msgText">${esc(m.text||'')}${m.edited?'<span class="editTag"> (ویرایش شده)</span>':''}</div>`;let tick='';if(m.sender===myName&&!String(m.receiver).startsWith('group:'))tick=m.status==='read'?'<span class="tick read">✓✓</span>':m.status==='delivered'?'<span class="tick">✓✓</span>':'<span class="tick">✓</span>';let senderName=selectedType==='group'&&m.sender!==myName?`<div class="replyPreview"><b>${esc(m.sender)}</b></div>`:'';let actions=!m.deleted?`<div class="msgActions">${m.type==='message'&&m.sender===myName?`<button onclick="editMessage('${m.id}')">Edit ✏️</button>`:''}${m.sender===myName?`<button onclick="deleteMessage('${m.id}')">Delete 🗑</button>`:''}<button onclick="replyMessage('${m.id}')">Reply ↩</button></div>`:'';div.innerHTML=`${senderName}${reply}${content}<div class="msgMeta">${m.time||''} ${tick}</div>${actions}`;div.onclick=e=>{document.querySelectorAll('.msg').forEach(x=>{if(x!==div)x.classList.remove('showActions')});div.classList.toggle('showActions');e.stopPropagation()};messages.appendChild(div);if(m.receiver===myName&&m.status!=='read')ws.send(JSON.stringify({type:'read',id:m.id,reader:myName}))});messages.scrollTop=messages.scrollHeight}
function basePayload(type){return {type,id:uuid(),sender:myName,receiver:receiverKey(),avatar:myAvatar,reply_id:replyTo?.id||'',reply_text:replyTo?(replyTo.text||replyTo.file_name||'media'):'',reply_sender:replyTo?.sender||''}}
function sendMessage(){let input=document.getElementById('messageInput'),text=input.value.trim();if(!selectedUser)return alert('اول یک نفر را انتخاب کنید');if(!text)return;ws.send(JSON.stringify({...basePayload('message'),text}));input.value='';cancelReply()}
function enterSend(e){if(e.key==='Enter')sendMessage()}function replyMessage(id){let m=allMessages.find(x=>x.id===id);if(!m||m.deleted)return;replyTo=m;document.getElementById('replyText').innerText='Reply: '+(m.text||m.file_name||'media');document.getElementById('replyBar').classList.add('show')}function cancelReply(){replyTo=null;document.getElementById('replyBar').classList.remove('show')}
function editMessage(id){let m=allMessages.find(x=>x.id===id);if(!m||m.deleted||m.type!=='message')return alert('فقط پیام متنی ویرایش می‌شود');let txt=prompt('متن جدید:',m.text||'');if(txt!==null&&txt.trim())ws.send(JSON.stringify({type:'edit',id,sender:myName,text:txt.trim()}))}function deleteMessage(id){if(confirm('پیام حذف شود؟'))ws.send(JSON.stringify({type:'delete',id,sender:myName}))}
function toggleEmoji(){document.getElementById('emojiPanel').classList.toggle('show')}const emojis='😀 😃 😄 😁 😂 😊 😍 😘 😎 😢 😭 😡 👍 👎 ❤️ 🔥 🎉 🙏 👋 ✅ ❌ ⭐ 🌹'.split(' ');document.getElementById('emojiPanel').innerHTML=emojis.map(e=>`<button onclick="addEmoji('${e}')">${e}</button>`).join('');function addEmoji(e){let i=document.getElementById('messageInput');i.value+=e;i.focus()}
document.getElementById('fileInput').addEventListener('change',function(){let f=this.files[0];if(!f||!selectedUser)return;if(f.size>5*1024*1024)return alert('فایل باید کمتر از 5MB باشد، برای Render رایگان بهتر است فایل‌ها کوچک باشند.');let r=new FileReader();r.onload=()=>{let isImg=f.type.startsWith('image/');ws.send(JSON.stringify({...basePayload(isImg?'image':'file'),image:isImg?r.result:'',file_name:f.name,file_type:f.type,file_data:isImg?'':r.result}));cancelReply()};r.readAsDataURL(f);this.value=''})
document.getElementById('voiceBtn').onclick=async()=>{if(!selectedUser)return alert('اول یک نفر را انتخاب کنید');if(!mediaRecorder){let stream=await navigator.mediaDevices.getUserMedia({audio:true});mediaRecorder=new MediaRecorder(stream);audioChunks=[];mediaRecorder.ondataavailable=e=>audioChunks.push(e.data);mediaRecorder.onstop=()=>{let blob=new Blob(audioChunks,{type:'audio/webm'}),r=new FileReader();r.onload=()=>ws.send(JSON.stringify({...basePayload('voice'),voice:r.result}));r.readAsDataURL(blob)};mediaRecorder.start();document.getElementById('voiceBtn').innerText='⏹'}else{mediaRecorder.stop();mediaRecorder=null;document.getElementById('voiceBtn').innerText='🎤'}};
function createGroup(){let name=prompt('نام گروپ:');if(!name)return;let people=prompt('نام کاربران را با کاما جدا بنویسید:');let members=(people||'').split(',').map(x=>x.trim()).filter(Boolean);ws.send(JSON.stringify({type:'create_group',id:uuid(),name,creator:myName,members}))}
function addStory(){let inp=document.createElement('input');inp.type='file';inp.accept='image/*,video/*';inp.onchange=()=>{let f=inp.files[0];if(!f)return;if(f.size>4*1024*1024)return alert('استوری باید کمتر از 4MB باشد');let r=new FileReader();r.onload=()=>ws.send(JSON.stringify({type:'story',id:uuid(),username:myName,media:r.result,media_type:f.type,text:''}));r.readAsDataURL(f)};inp.click()}function renderStories(){let box=document.getElementById('stories');box.innerHTML='<div class="story" onclick="addStory()"><div class="storyCircle">+</div><div>استوری</div></div>';stories.forEach(s=>{let d=document.createElement('div');d.className='story';d.onclick=()=>showStory(s);d.innerHTML=`<img src="${s.media}"><div>${esc(s.username)}</div>`;box.appendChild(d)})}function showStory(s){let w=window.open('','_blank');w.document.write(`<body style="margin:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh"><${s.media_type.startsWith('video')?'video controls autoplay':'img'} src="${s.media}" style="max-width:100%;max-height:100%"></${s.media_type.startsWith('video')?'video':'img'}></body>`)}
function toggleMsgSearch(){let b=document.getElementById('msgSearchBox');b.style.display=b.style.display==='none'?'flex':'none'}function toggleTheme(){document.body.classList.toggle('light');let l=document.body.classList.contains('light');localStorage.setItem('theme',l?'light':'dark');document.querySelector('.themeBtn').innerText=l?'☀️':'🌙'}window.addEventListener('load',()=>{if(localStorage.getItem('theme')==='light'){document.body.classList.add('light');document.querySelector('.themeBtn').innerText='☀️'}});document.addEventListener('click',()=>document.querySelectorAll('.msg').forEach(x=>x.classList.remove('showActions')));document.getElementById('searchUser').addEventListener('input',renderList);document.getElementById('messageInput').addEventListener('input',()=>{if(selectedUser)ws.send(JSON.stringify({type:'typing',sender:myName,receiver:receiverKey()}))});
async function makePC(peer,audioOnly=false){
pc=new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'}]});
pc.onicecandidate=e=>{
if(e.candidate)ws.send(JSON.stringify({type:'ice-candidate',sender:myName,receiver:peer,candidate:e.candidate}))
};
pc.ontrack=e=>{
if(audioOnly){
let remoteAudio=document.getElementById('remoteAudio');
if(!remoteAudio){
remoteAudio=document.createElement('audio');
remoteAudio.id='remoteAudio';
remoteAudio.autoplay=true;
document.body.appendChild(remoteAudio);
}
remoteAudio.srcObject=e.streams[0];
remoteAudio.play().catch(()=>{});
}else{
document.getElementById('remoteVideo').srcObject=e.streams[0];
}
};
localStream=await navigator.mediaDevices.getUserMedia(audioOnly?{audio:true}:{video:true,audio:true});
localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));
document.getElementById('callTitle').innerText=audioOnly?'تماس صوتی':'تماس تصویری';
document.querySelector('.videoBox').style.display=audioOnly?'none':'grid';
if(!audioOnly)document.getElementById('localVideo').srcObject=localStream;
document.getElementById('callOverlay').classList.add('show')
}
async function startAudioCall(){
if(!selectedUser||selectedType!=='user')return alert('تماس صوتی فقط برای پیام خصوصی است');
callPeer=selectedUser;
await makePC(callPeer,true);
let offer=await pc.createOffer();
await pc.setLocalDescription(offer);
ws.send(JSON.stringify({type:'call-offer',sender:myName,receiver:callPeer,offer,audioOnly:true}))
}
async function startCall(){
if(!selectedUser||selectedType!=='user')return alert('تماس تصویری فقط برای پیام خصوصی است');
callPeer=selectedUser;
await makePC(callPeer,false);
let offer=await pc.createOffer();
await pc.setLocalDescription(offer);
ws.send(JSON.stringify({type:'call-offer',sender:myName,receiver:callPeer,offer,audioOnly:false}))
}
async function receiveOffer(d){
let audioOnly=!!d.audioOnly;
let callText=audioOnly?'تماس صوتی':'تماس تصویری';
if(!confirm(`${d.sender} ${callText} می‌گیرد. قبول می‌کنید؟`)){
ws.send(JSON.stringify({type:'call-end',sender:myName,receiver:d.sender}));
return
}
callPeer=d.sender;
await makePC(callPeer,audioOnly);
await pc.setRemoteDescription(new RTCSessionDescription(d.offer));
let ans=await pc.createAnswer();
await pc.setLocalDescription(ans);
ws.send(JSON.stringify({type:'call-answer',sender:myName,receiver:callPeer,answer:ans}))
}
async function receiveAnswer(d){if(pc)await pc.setRemoteDescription(new RTCSessionDescription(d.answer))}
async function receiveIce(d){if(pc&&d.candidate)try{await pc.addIceCandidate(new RTCIceCandidate(d.candidate))}catch(e){}}
function endCall(send=true){
if(send&&callPeer)ws.send(JSON.stringify({type:'call-end',sender:myName,receiver:callPeer}));
if(pc)pc.close();
pc=null;
if(localStream)localStream.getTracks().forEach(t=>t.stop());
localStream=null;
callPeer='';
document.getElementById('callOverlay').classList.remove('show');
document.querySelector('.videoBox').style.display='grid';
document.getElementById('localVideo').srcObject=null;
document.getElementById('remoteVideo').srcObject=null;
let remoteAudio=document.getElementById('remoteAudio');
if(remoteAudio)remoteAudio.remove()
}
</script></body></html>
